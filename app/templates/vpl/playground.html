{% extends "base.html" %}

{% block extra_head %}
<style>
    #codeEditor {
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        line-height: 1.5;
        background-color: #1e1e1e;
        color: #d4d4d4;
        border: 1px solid #333;
        border-radius: 4px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="display-5 fw-bold text-primary">
                        <i class="fas fa-laptop-code me-2"></i>VPL Playground
                    </h1>
                    <p class="lead text-muted">Practice coding in a safe sandbox environment</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        
        <!-- Main Playground Area -->
        <div class="col-lg-18">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">
                        <i class="fas fa-code me-2 text-primary"></i>Code Editor
                    </h5>
                </div>

                <div class="card-body">
                    <iframe
                    frameBorder="0"
                    height="450px"
                    src="https://onecompiler.com/embed/"
                    width="100%"
                    ></iframe>
                </div>

            </div>
        </div>
        
    </div>
</div>

{% endblock %}
