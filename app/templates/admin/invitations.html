{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="fw-bold text-primary"><i class="fas fa-envelope me-2"></i>Instructor Invitations</h1>
            <p class="text-muted">Send and manage instructor invitation codes</p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="fw-bold mb-0">Create New Invitation</h5>
                </div>
                <div class="card-body">
                    <form id="invitationForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="invitationEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="invitationFullName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="invitationUsername" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-paper-plane me-2"></i>Generate Invitation
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7 mb-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-info text-white">
                    <h5 class="fw-bold mb-0">Recent Invitations</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Email</th>
                                    <th>Code</th>
                                    <th>Status</th>
                                    <th>Expires</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="invitationsList">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">
                                        <i class="fas fa-inbox fa-3x mb-3 d-block"></i>
                                        No invitations yet
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('invitationForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('invitationEmail').value;
    const fullName = document.getElementById('invitationFullName').value;
    const username = document.getElementById('invitationUsername').value;
    
    try {
        const response = await fetch('/api/v1/admin/invitations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, full_name: fullName, username })
        });
        
        if (response.ok) {
            showToast('Invitation created successfully!', 'success');
            document.getElementById('invitationForm').reset();
            loadInvitations();
        } else {
            const error = await response.json();
            showToast(error.detail || 'Failed to create invitation', 'error');
        }
    } catch (error) {
        showToast('An error occurred', 'error');
    }
});

async function loadInvitations() {
    try {
        const response = await fetch('/api/v1/admin/invitations');
        const invitations = await response.json();
        
        const tbody = document.getElementById('invitationsList');
        if (invitations.length === 0) {
            tbody.innerHTML = `
                <tr><td colspan="5" class="text-center text-muted py-4">
                    <i class="fas fa-inbox fa-3x mb-3 d-block"></i>
                    No invitations yet
                </td></tr>
            `;
            return;
        }
        
        tbody.innerHTML = invitations.map(inv => `
            <tr>
                <td>${escapeHtml(inv.email)}</td>
                <td><code class="bg-light p-1">${escapeHtml(inv.code)}</code></td>
                <td>
                    <span class="badge bg-${inv.is_used ? 'secondary' : 'success'}">
                        ${inv.is_used ? 'Used' : 'Pending'}
                    </span>
                </td>
                <td>${inv.expires_at?.slice(0, 10) || 'N/A'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteInvitation('${inv.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    } catch (error) {
        console.error('Error loading invitations:', error);
    }
}

async function deleteInvitation(id) {
    if (!confirm('Delete this invitation?')) return;
    
    try {
        const response = await fetch(`/api/v1/admin/invitations/${id}`, { method: 'DELETE' });
        if (response.ok) {
            showToast('Invitation deleted', 'success');
            loadInvitations();
        } else {
            showToast('Failed to delete invitation', 'error');
        }
    } catch (error) {
        showToast('An error occurred', 'error');
    }
}

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `alert alert-${type === 'success' ? 'success' : 'danger'} position-fixed top-0 end-0 m-3 shadow`;
    toast.style.zIndex = '9999';
    toast.style.minWidth = '300px';
    toast.innerHTML = `
        <div class="d-flex align-items-center">
            <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
            <div class="flex-grow-1">${message}</div>
            <button type="button" class="btn-close ms-3" onclick="this.parentElement.parentElement.remove()"></button>
        </div>
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Load invitations on page load
loadInvitations();
</script>
{% endblock %}
