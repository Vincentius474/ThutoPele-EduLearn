{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="fw-bold text-primary"><i class="fas fa-upload me-2"></i>Course Materials</h1>
            <p class="lead text-muted">Manage and upload materials for your courses</p>
        </div>
    </div>

    <!-- Course Selection -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Select Course</h5>
                    <select class="form-select" id="courseSelect" onchange="loadCourseMaterials()">
                        <option value="">Choose a course...</option>
                        {% for course in courses %}
                        <option value="{{ course.id }}">{{ course.title }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Materials Management (hidden until course selected) -->
    <div id="materialsSection" style="display: none;">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0" id="selectedCourseTitle"></h5>
                        <button class="btn btn-primary btn-sm" onclick="showUploadModal()">
                            <i class="fas fa-plus"></i> Add Material
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="row" id="materialsList">
                            <!-- Materials will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Material Stats -->
        <div class="row">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted">Total Materials</h6>
                        <h3 class="fw-bold" id="totalMaterials">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted">Videos</h6>
                        <h3 class="fw-bold" id="videoCount">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted">Documents</h6>
                        <h3 class="fw-bold" id="documentCount">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted">Total Size</h6>
                        <h3 class="fw-bold" id="totalSize">0 MB</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Upload Material Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Upload Course Material</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="uploadForm" enctype="multipart/form-data">
                    <input type="hidden" id="materialCourseId">
                    
                    <div class="mb-3">
                        <label class="form-label">Material Type</label>
                        <select class="form-select" id="materialType" required onchange="toggleMaterialFields()">
                            <option value="">Select type...</option>
                            <option value="video">Video</option>
                            <option value="document">Document</option>
                            <option value="link">External Link</option>
                            <option value="file">File</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" id="materialTitle" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="materialDescription" rows="3"></textarea>
                    </div>
                    
                    <!-- File Upload Field (for video, document, file) -->
                    <div class="mb-3" id="fileUploadField" style="display: none;">
                        <label class="form-label">Choose File</label>
                        <input type="file" class="form-control" id="materialFile">
                        <small class="text-muted">
                            Max size: 
                            <span id="sizeLimit">100MB for videos, 50MB for documents</span>
                        </small>
                    </div>
                    
                    <!-- Link Field (for external links) -->
                    <div class="mb-3" id="linkField" style="display: none;">
                        <label class="form-label">External URL</label>
                        <input type="url" class="form-control" id="materialUrl" placeholder="https://...">
                    </div>
                    
                    <!-- Video Duration (for videos) -->
                    <div class="mb-3" id="durationField" style="display: none;">
                        <label class="form-label">Duration (minutes)</label>
                        <input type="number" class="form-control" id="materialDuration" min="1" value="10">
                    </div>
                    
                    <!-- Order Index -->
                    <div class="mb-3">
                        <label class="form-label">Order</label>
                        <input type="number" class="form-control" id="materialOrder" min="0" value="0">
                    </div>
                    
                    <!-- Publish Status -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="materialPublished" checked>
                        <label class="form-check-label">Published (visible to students)</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="uploadMaterial()">
                    <span class="spinner-border spinner-border-sm d-none" id="uploadSpinner"></span>
                    <span>Upload Material</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Material Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Edit Material</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <input type="hidden" id="editMaterialId">
                    
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" id="editTitle" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="editDescription" rows="3"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Order</label>
                        <input type="number" class="form-control" id="editOrder" min="0">
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="editPublished">
                        <label class="form-check-label">Published</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateMaterial()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentCourseId = null;

function toggleMaterialFields() {
    const type = document.getElementById('materialType').value;
    const fileField = document.getElementById('fileUploadField');
    const linkField = document.getElementById('linkField');
    const durationField = document.getElementById('durationField');
    const sizeLimit = document.getElementById('sizeLimit');
    
    fileField.style.display = 'none';
    linkField.style.display = 'none';
    durationField.style.display = 'none';
    
    if (type === 'video') {
        fileField.style.display = 'block';
        durationField.style.display = 'block';
        sizeLimit.textContent = '500MB';
    } else if (type === 'document' || type === 'file') {
        fileField.style.display = 'block';
        sizeLimit.textContent = type === 'document' ? '50MB' : '100MB';
    } else if (type === 'link') {
        linkField.style.display = 'block';
    }
}

async function loadCourseMaterials() {
    const courseId = document.getElementById('courseSelect').value;
    if (!courseId) return;
    
    currentCourseId = courseId;
    document.getElementById('materialsSection').style.display = 'block';
    document.getElementById('materialCourseId').value = courseId;
    
    // Get course title
    const select = document.getElementById('courseSelect');
    const selectedOption = select.options[select.selectedIndex];
    document.getElementById('selectedCourseTitle').textContent = selectedOption.text + ' - Materials';
    
    try {
        const response = await fetch(`/api/v1/courses/${courseId}/materials`);
        const materials = await response.json();
        
        displayMaterials(materials);
        updateStats(materials);
    } catch (error) {
        console.error('Error loading materials:', error);
    }
}

function displayMaterials(materials) {
    const container = document.getElementById('materialsList');
    
    if (!materials || materials.length === 0) {
        container.innerHTML = `
            <div class="col-12 text-center py-5">
                <i class="fas fa-file fa-4x text-muted mb-3"></i>
                <h5>No Materials Yet</h5>
                <p class="text-muted">Click "Add Material" to upload your first course material.</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    materials.forEach((material, index) => {
        const icon = getMaterialIcon(material.material_type);
        const size = material.file_size ? formatBytes(material.file_size) : '';
        
        html += `
            <div class="col-md-6 col-lg-4 mb-3">
                <div class="card h-100 border-0 shadow-sm material-card">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-2">
                            <i class="fas ${icon} fa-2x text-primary me-2"></i>
                            <h6 class="fw-bold mb-0">${material.title}</h6>
                        </div>
                        <p class="small text-muted mb-2">${material.description || 'No description'}</p>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="badge bg-info">${material.material_type}</span>
                            ${size ? `<small class="text-muted">${size}</small>` : ''}
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">Order: ${material.order_index || 0}</small>
                            <div>
                                <button class="btn btn-sm btn-outline-primary me-1" onclick="editMaterial('${material.id}')">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteMaterial('${material.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        ${material.content_url ? `
                            <a href="${material.content_url}" target="_blank" class="btn btn-sm btn-outline-secondary w-100 mt-2">
                                <i class="fas fa-external-link-alt me-2"></i>View Material
                            </a>
                        ` : ''}
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function getMaterialIcon(type) {
    const icons = {
        'video': 'fa-video',
        'document': 'fa-file-pdf',
        'link': 'fa-link',
        'file': 'fa-file',
        'quiz': 'fa-question-circle',
        'assignment': 'fa-tasks'
    };
    return icons[type] || 'fa-file';
}

function formatBytes(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function updateStats(materials) {
    document.getElementById('totalMaterials').textContent = materials.length;
    
    const videos = materials.filter(m => m.material_type === 'video').length;
    const docs = materials.filter(m => m.material_type === 'document' || m.material_type === 'file').length;
    const totalSize = materials.reduce((sum, m) => sum + (m.file_size || 0), 0);
    
    document.getElementById('videoCount').textContent = videos;
    document.getElementById('documentCount').textContent = docs;
    document.getElementById('totalSize').textContent = formatBytes(totalSize);
}

function showUploadModal() {
    if (!currentCourseId) {
        alert('Please select a course first');
        return;
    }
    document.getElementById('uploadForm').reset();
    document.getElementById('fileUploadField').style.display = 'none';
    document.getElementById('linkField').style.display = 'none';
    document.getElementById('durationField').style.display = 'none';
    new bootstrap.Modal(document.getElementById('uploadModal')).show();
}

async function uploadMaterial() {
    const type = document.getElementById('materialType').value;
    if (!type) {
        alert('Please select a material type');
        return;
    }
    
    const formData = new FormData();
    formData.append('title', document.getElementById('materialTitle').value);
    formData.append('description', document.getElementById('materialDescription').value);
    formData.append('material_type', type);
    formData.append('order_index', document.getElementById('materialOrder').value);
    formData.append('is_published', document.getElementById('materialPublished').checked);
    
    if (type === 'video') {
        const file = document.getElementById('materialFile').files[0];
        if (!file) {
            alert('Please select a video file');
            return;
        }
        formData.append('file', file);
        formData.append('duration', document.getElementById('materialDuration').value);
    } else if (type === 'document' || type === 'file') {
        const file = document.getElementById('materialFile').files[0];
        if (!file) {
            alert('Please select a file');
            return;
        }
        formData.append('file', file);
    } else if (type === 'link') {
        const url = document.getElementById('materialUrl').value;
        if (!url) {
            alert('Please enter a URL');
            return;
        }
        formData.append('content_url', url);
    }
    
    const btn = document.querySelector('#uploadModal .btn-primary');
    const spinner = document.getElementById('uploadSpinner');
    const btnText = btn.querySelector('span:last-child');
    
    btn.disabled = true;
    spinner.classList.remove('d-none');
    btnText.textContent = 'Uploading...';
    
    try {
        const response = await fetch(`/api/v1/courses/${currentCourseId}/materials`, {
            method: 'POST',
            body: formData
        });
        
        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
            await loadCourseMaterials();
            alert('Material uploaded successfully!');
        } else {
            const error = await response.json();
            alert(error.detail || 'Upload failed');
        }
    } catch (error) {
        console.error('Upload error:', error);
        alert('An error occurred');
    } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
        btnText.textContent = 'Upload Material';
    }
}

async function editMaterial(materialId) {
    try {
        const response = await fetch(`/api/v1/courses/materials/${materialId}`);
        const material = await response.json();
        
        document.getElementById('editMaterialId').value = material.id;
        document.getElementById('editTitle').value = material.title;
        document.getElementById('editDescription').value = material.description || '';
        document.getElementById('editOrder').value = material.order_index || 0;
        document.getElementById('editPublished').checked = material.is_published;
        
        new bootstrap.Modal(document.getElementById('editModal')).show();
    } catch (error) {
        console.error('Error loading material:', error);
    }
}

async function updateMaterial() {
    const materialId = document.getElementById('editMaterialId').value;
    const data = {
        title: document.getElementById('editTitle').value,
        description: document.getElementById('editDescription').value,
        order_index: parseInt(document.getElementById('editOrder').value),
        is_published: document.getElementById('editPublished').checked
    };
    
    try {
        const response = await fetch(`/api/v1/courses/materials/${materialId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
            await loadCourseMaterials();
            alert('Material updated successfully!');
        } else {
            alert('Update failed');
        }
    } catch (error) {
        console.error('Update error:', error);
    }
}

async function deleteMaterial(materialId) {
    if (!confirm('Are you sure you want to delete this material?')) return;
    
    try {
        const response = await fetch(`/api/v1/courses/materials/${materialId}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            await loadCourseMaterials();
            alert('Material deleted successfully!');
        } else {
            alert('Delete failed');
        }
    } catch (error) {
        console.error('Delete error:', error);
    }
}
</script>

<style>
.material-card {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.material-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.15) !important;
}

.stat-icon {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
{% endblock %}
