{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0"><i class="fas fa-key me-2"></i>Reset Password</h4>
            </div>
            <div class="card-body">
                <form id="resetPasswordForm">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="newPassword" 
                                   placeholder="Enter new password" required minlength="8">
                            <button class="btn btn-outline-secondary" type="button" id="toggleNewPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="text-muted">Minimum 8 characters</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="confirmPassword" 
                                   placeholder="Confirm new password" required>
                            <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="password-requirements">
                            <small class="text-muted d-block mb-2">Password must contain:</small>
                            <ul class="list-unstyled">
                                <li id="req-length" class="text-muted">
                                    <i class="fas fa-circle me-2 fa-xs"></i>At least 8 characters
                                </li>
                                <li id="req-uppercase" class="text-muted">
                                    <i class="fas fa-circle me-2 fa-xs"></i>One uppercase letter
                                </li>
                                <li id="req-lowercase" class="text-muted">
                                    <i class="fas fa-circle me-2 fa-xs"></i>One lowercase letter
                                </li>
                                <li id="req-number" class="text-muted">
                                    <i class="fas fa-circle me-2 fa-xs"></i>One number
                                </li>
                                <li id="req-special" class="text-muted">
                                    <i class="fas fa-circle me-2 fa-xs"></i>One special character
                                </li>
                            </ul>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100" id="submitBtn" disabled>
                        <i class="fas fa-save me-2"></i>Reset Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    if (!token) {
        showAlert('error', 'Invalid or missing reset token');
        setTimeout(() => window.location.href = '/login', 3000);
    }
    
    // Toggle password visibility
    document.getElementById('toggleNewPassword').addEventListener('click', function() {
        togglePassword('newPassword', this);
    });
    
    document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
        togglePassword('confirmPassword', this);
    });
    
    // Password validation
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    
    function validatePassword() {
        const password = newPassword.value;
        
        // Check requirements
        const hasLength = password.length >= 8;
        const hasUppercase = /[A-Z]/.test(password);
        const hasLowercase = /[a-z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
        
        // Update UI
        updateRequirement('req-length', hasLength);
        updateRequirement('req-uppercase', hasUppercase);
        updateRequirement('req-lowercase', hasLowercase);
        updateRequirement('req-number', hasNumber);
        updateRequirement('req-special', hasSpecial);
        
        // Check if passwords match
        const passwordsMatch = password === confirmPassword.value && password.length > 0;
        
        // Enable submit if all requirements met and passwords match
        submitBtn.disabled = !(hasLength && hasUppercase && hasLowercase && 
                              hasNumber && hasSpecial && passwordsMatch);
    }
    
    function updateRequirement(id, isValid) {
        const el = document.getElementById(id);
        if (isValid) {
            el.className = 'text-success';
            el.querySelector('i').className = 'fas fa-check-circle me-2 fa-xs';
        } else {
            el.className = 'text-muted';
            el.querySelector('i').className = 'fas fa-circle me-2 fa-xs';
        }
    }
    
    newPassword.addEventListener('input', validatePassword);
    confirmPassword.addEventListener('input', validatePassword);
    
    // Form submission
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        try {
            const response = await fetch('/api/v1/auth/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: token,
                    new_password: newPassword.value
                })
            });
            
            if (response.ok) {
                showAlert('success', 'Password reset successfully! Redirecting to login...');
                setTimeout(() => window.location.href = '/login', 3000);
            } else {
                const data = await response.json();
                showAlert('error', data.detail || 'Failed to reset password');
            }
        } catch (error) {
            showAlert('error', 'An error occurred');
        }
    });
});

function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);
    const icon = button.querySelector('i');
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

function showAlert(type, message) {
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type === 'error' ? 'danger' : 'success'} alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x mt-3`;
    alertDiv.style.zIndex = '9999';
    alertDiv.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    document.body.appendChild(alertDiv);
    
    setTimeout(() => {
        alertDiv.remove();
    }, 5000);
}
</script>
{% endblock %}
