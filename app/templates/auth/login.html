{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Welcome Back</h4>
            </div>
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-graduation-cap fa-4x text-primary mb-3"></i>
                    <h5>Sign in to continue</h5>
                </div>
                
                <div class="d-grid gap-3">
                    <!-- GitHub Login -->
                    <a href="/api/v1/auth/login/github" class="btn btn-dark btn-lg">
                        <i class="fab fa-github me-2"></i>Continue with GitHub
                    </a>
                    
                    <!-- Google Login -->
                    <a href="/api/v1/auth/login/google" class="btn btn-outline-danger btn-lg">
                        <i class="fab fa-google me-2"></i>Continue with Google
                    </a>
                </div>
                
                <hr class="my-4">
                
                <p class="text-muted small text-center">
                    By signing in, you agree to our 
                    <a href="/terms" class="text-decoration-none">Terms of Service</a> and 
                    <a href="/privacy" class="text-decoration-none">Privacy Policy</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
